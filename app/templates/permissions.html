{% extends "base.html" %}{% block title %}Permissões{% endblock %}{% block content %}
<div class="card"><h2>Administração de perfis</h2><p class="muted">Gerencie o que cada perfil pode visualizar, criar, editar ou excluir.</p><form method="post" action="/admin/permissions/save"><table><thead><tr><th>Perfil</th><th>Módulo</th><th>Ver</th><th>Criar</th><th>Editar</th><th>Excluir</th></tr></thead><tbody>{% for r in rows %}<tr><td>{{ r.role }}</td><td>{{ r.module }}</td><td><input type="checkbox" name="view_{{ r.id }}" {% if r.can_view=='Sim' %}checked{% endif %}></td><td><input type="checkbox" name="create_{{ r.id }}" {% if r.can_create=='Sim' %}checked{% endif %}></td><td><input type="checkbox" name="edit_{{ r.id }}" {% if r.can_edit=='Sim' %}checked{% endif %}></td><td><input type="checkbox" name="delete_{{ r.id }}" {% if r.can_delete=='Sim' %}checked{% endif %}></td></tr>{% endfor %}</tbody></table><button class="btn">Salvar permissões</button></form></div>
{% endblock %}

{% extends "base.html" %}{% block title %}Compras{% endblock %}{% block content %}
<div class="card"><h2>Nova compra</h2><form class="form-grid" method="post" action="/backoffice/purchases/add"><label>Fornecedor<select name="supplier_id">{% for s in suppliers %}<option value="{{ s.id }}">{{ s.name }}</option>{% endfor %}</select></label><label>Descrição<input name="description"></label><label>Valor<input name="amount"></label><label>Status<select name="status"><option>Aberto</option><option>Aprovado</option><option>Recebido</option><option>Cancelado</option></select></label><label>Emissão<input name="issue_date"></label><label>Vencimento<input name="due_date"></label><label>Observações<input name="notes"></label><div class="form-actions"><button class="btn">Cadastrar compra</button></div></form></div><div class="card"><h2>Compras</h2><table><thead><tr><th>Fornecedor</th><th>Descrição</th><th>Valor</th><th>Status</th><th>Vencimento</th></tr></thead><tbody>{% for r in rows %}<tr><td>{{ r.supplier_name }}</td><td>{{ r.description }}</td><td>{{ money(r.amount) }}</td><td>{{ r.status }}</td><td>{{ r.due_date }}</td></tr>{% endfor %}</tbody></table></div>
{% endblock %}
